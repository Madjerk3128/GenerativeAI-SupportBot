<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Bot | Powered by Gemini</title>
    <meta name="description" content="Get instant AI-powered customer support for all your issues — from network problems to account help, resolved in seconds.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-input: #1e1e2a;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --accent-hover: #7d75ff;
            --accent-gradient: linear-gradient(135deg, #6c63ff, #a78bfa);
            --text-primary: #f0f0ff;
            --text-secondary: #9898b0;
            --text-muted: #5a5a70;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(108, 99, 255, 0.5);
            --user-bubble: linear-gradient(135deg, #6c63ff, #a78bfa);
            --bot-bubble: #1e1e2a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-wrapper {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(22, 22, 31, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 20px 20px 0 0;
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-info {
            flex: 1;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.85); }
        }

        .status-text {
            font-size: 12px;
            color: #22c55e;
            font-weight: 500;
        }

        .header-badge {
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: #a78bfa;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        /* Welcome message */
        .welcome-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            box-shadow: 0 0 40px var(--accent-glow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 380px;
            margin-bottom: 28px;
        }

        .quick-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .quick-topic-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .quick-topic-btn:hover {
            border-color: var(--border-active);
            color: var(--text-primary);
            background: rgba(108, 99, 255, 0.1);
            transform: translateY(-1px);
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.35s ease;
            max-width: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.bot .msg-avatar {
            background: var(--accent-gradient);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .message.user .msg-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .msg-content {
            max-width: calc(100% - 56px);
        }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-wrap: break-word;
        }

        .message.user .msg-bubble {
            background: var(--user-bubble);
            color: #fff;
            border-radius: 18px 18px 6px 18px;
        }

        .message.bot .msg-bubble {
            background: var(--bot-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 6px;
        }

        .msg-bubble strong {
            color: #a78bfa;
        }

        .msg-bubble h2, .msg-bubble h3 {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 6px;
            margin-top: 12px;
        }

        .msg-bubble h2:first-child, .msg-bubble h3:first-child {
            margin-top: 0;
        }

        .msg-bubble ol, .msg-bubble ul {
            padding-left: 20px;
            margin: 8px 0;
        }

        .msg-bubble li {
            margin-bottom: 4px;
        }

        .msg-bubble p {
            margin-bottom: 8px;
        }

        .msg-bubble p:last-child {
            margin-bottom: 0;
        }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            padding: 0 4px;
        }

        .message.user .msg-time {
            text-align: right;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.35s ease;
        }

        .typing-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 6px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: rgba(22, 22, 31, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 0 0 20px 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #question-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            padding: 6px 0;
        }

        #question-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent-gradient);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        #send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #send-btn:active {
            transform: scale(0.97);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
        }

        /* Error state */
        .error-bubble {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.3) !important;
            color: #fca5a5 !important;
        }

        /* Markdown rendering */
        .msg-bubble code {
            background: rgba(108, 99, 255, 0.15);
            color: #a78bfa;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 0; }
            .app-wrapper { height: 100vh; max-height: none; border-radius: 0; }
            .header { border-radius: 0; }
            .input-area { border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <div class="header">
            <div class="bot-avatar">🤖</div>
            <div class="header-info">
                <div class="header-title">AI Support Assistant</div>
                <div class="header-status">
                    <div class="status-dot"></div>
                    <span class="status-text">Online · Ready to help</span>
                </div>
            </div>
            <div class="header-badge">✨ Gemini</div>
        </div>

        <!-- Chat messages -->
        <div class="chat-container" id="chat-container">
            <div class="welcome-card" id="welcome-card">
                <div class="welcome-icon">🎯</div>
                <h1 class="welcome-title">How can I help you today?</h1>
                <p class="welcome-subtitle">
                    I'm your AI-powered support assistant. Ask me anything — from technical issues to account problems, I'm here 24/7.
                </p>
                <div class="quick-topics">
                    <button class="quick-topic-btn" onclick="quickAsk('My internet is not working')">📶 Internet Issues</button>
                    <button class="quick-topic-btn" onclick="quickAsk('I forgot my password')">🔑 Password Reset</button>
                    <button class="quick-topic-btn" onclick="quickAsk('My app keeps crashing')">💥 App Crashes</button>
                    <button class="quick-topic-btn" onclick="quickAsk('How do I update my billing info?')">💳 Billing</button>
                    <button class="quick-topic-btn" onclick="quickAsk('I cannot log in to my account')">🔐 Login Problems</button>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="question-input"
                    placeholder="Describe your issue..."
                    rows="1"
                    maxlength="1000"
                    aria-label="Type your support question"
                ></textarea>
                <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');
        let welcomeRemoved = false;

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });

        // Enter to send
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function quickAsk(text) {
            input.value = text;
            sendMessage();
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function removeWelcome() {
            if (!welcomeRemoved) {
                const card = document.getElementById('welcome-card');
                if (card) card.remove();
                welcomeRemoved = true;
            }
        }

        function addMessage(text, type) {
            removeWelcome();

            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            const avatar = type === 'user' ? '👤' : '🤖';

            msg.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-content">
                    <div class="msg-bubble ${type === 'error' ? 'error-bubble' : ''}">${renderMarkdown(text)}</div>
                    <div class="msg-time">${getTime()}</div>
                </div>
            `;

            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            removeWelcome();
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typing';
            typing.innerHTML = `
                <div class="msg-avatar bot-avatar" style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;">🤖</div>
                <div class="typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function renderMarkdown(text) {
            // Basic markdown parsing
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h2>$1</h2>')
                .replace(/^\d+\. (.*$)/gm, '<li>$1</li>')
                .replace(/^[-*] (.*$)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gs, (m) => `<ol>${m}</ol>`)
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question || sendBtn.disabled) return;

            // Reset input
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Show user message
            addMessage(question, 'user');

            // Show typing
            showTyping();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                hideTyping();

                if (response.ok) {
                    addMessage(data.answer, 'bot');
                } else {
                    addMessage(data.error || 'Something went wrong. Please try again.', 'bot');
                }
            } catch (err) {
                hideTyping();
                addMessage('⚠️ Network error. Please check your connection and try again.', 'bot');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
